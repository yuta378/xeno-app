<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XENO - ゲーム</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/game.css" />
</head>
<body>

  <!-- ターン表示バナー -->
  <div id="turnBanner" class="turn-banner">読み込み中...</div>

  <div class="game-wrapper">

    <!-- 相手エリア -->
    <div class="player-area opponent-area">
      <div class="area-label" id="opponentLabel">相手</div>
      <div id="opponentCards" class="card-row"></div>
    </div>

    <!-- 中央エリア（デッキ・公開カード） -->
    <div class="center-area">

      <div class="deck-box">
        <div class="card-back-deck">
          <div class="deck-xeno">XENO</div>
        </div>
        <div class="deck-info">
          山札：<span id="deckCount">0</span>枚
        </div>
      </div>

      <div class="open-box">
        <div class="open-label">除外カード（公開）</div>
        <div id="openCards" class="open-cards-row"></div>
      </div>

    </div>

    <!-- 自分エリア -->
    <div class="player-area my-area">
      <div class="area-label" id="myLabel">あなた</div>
      <div id="myCards" class="card-row"></div>

      <!-- アクションボタン -->
      <div id="actionArea" class="action-area hidden">
        <p class="action-hint">プレイするカードを選んでください</p>
        <button id="playCardBtn" class="btn-primary" disabled>
          カードを選択してください
        </button>
      </div>
    </div>

    <!-- ゲームログ -->
    <div class="log-area">
      <div class="log-title">📜 ゲームログ</div>
      <div id="gameLog" class="log-list"></div>
    </div>
<!-- 死神・皇帝：捨て札選択モーダル -->
<div id="discardModal" class="modal hidden">
  <div class="modal-content">
    <h3 id="discardTitle">手札から1枚を捨てる</h3>
    <p class="modal-desc">捨てるカードを選んでください</p>
    <div id="discardCards" class="guess-cards-grid"></div>
  </div>
</div>

<!-- 賢者：3枚から1枚選ぶモーダル -->
<div id="sageModal" class="modal hidden">
  <div class="modal-content">
    <h3>🧙 賢者の選択</h3>
    <p class="modal-desc">山札から3枚引きました。1枚を選んでください</p>
    <div id="sageCards" class="guess-cards-grid"></div>
  </div>
</div>
  </div>

  <!-- 兵士：カード宣言モーダル -->
  <div id="guessModal" class="modal hidden">
    <div class="modal-content">
      <h3>⚔️ 相手の手札を宣言する</h3>
      <p class="modal-desc">相手が持っているカードを選んでください</p>
      <div id="guessCards" class="guess-cards-grid"></div>
      <button id="cancelGuessBtn" class="btn-secondary">キャンセル</button>
    </div>
  </div>

  <!-- 占師：相手の手札公開モーダル -->
  <div id="revealModal" class="modal hidden">
    <div class="modal-content">
      <h3>🔮 相手の手札を確認</h3>
      <p class="modal-desc">あなただけに見えています</p>
      <div id="revealCardDisplay" class="reveal-card-display"></div>
      <button id="closeRevealBtn" class="btn-primary">確認した</button>
    </div>
  </div>

  <!-- ゲーム結果オーバーレイ -->
  <div id="resultOverlay" class="result-overlay hidden">
    <div class="result-content">
      <div id="resultIcon"   class="result-icon"></div>
      <div id="resultTitle"  class="result-title"></div>
      <div id="resultReason" class="result-reason"></div>
      <div id="resultCards"  class="result-cards"></div>
      <button id="returnLobbyBtn" class="btn-primary">ロビーに戻る</button>
    </div>
  </div>

  <script type="module" src="js/game.js"></script>

</body>
</html>
