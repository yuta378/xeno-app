<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XENO - ロビー</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/lobby.css" />
</head>
<body>

  <div class="container">

    <!-- ヘッダー -->
    <div class="lobby-header">
      <h1 class="title-small">XENO</h1>
      <p id="playerNameDisplay" class="player-name"></p>
    </div>

    <!-- ルーム作成 -->
    <div class="card">
      <h2>ルームを作成する</h2>
      <p class="description">新しいルームを作って友達を招待しよう</p>
      <button id="createRoomBtn" class="btn-primary">ルームを作成</button>
    </div>

    <!-- 区切り線 -->
    <div class="divider">または</div>

    <!-- ルーム参加 -->
    <div class="card">
      <h2>ルームに参加する</h2>
      <p class="description">ルームIDを入力して参加しよう</p>
      <input
        type="text"
        id="roomIdInput"
        placeholder="ルームIDを入力（例：ABC123）"
        maxlength="6"
      />
      <p id="joinErrorMsg" class="error hidden"></p>
      <button id="joinRoomBtn" class="btn-secondary">参加する</button>
    </div>

    <!-- 戻るボタン -->
    <button id="logoutBtn" class="btn-logout">← 最初の画面に戻る</button>

  </div>

  <script type="module" src="js/lobby.js"></script>

</body>
</html>
