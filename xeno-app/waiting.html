<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XENO - 待機中</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/waiting.css" />
</head>
<body>

  <div class="container">

    <!-- ヘッダー -->
    <div class="waiting-header">
      <h1 class="title-small">XENO</h1>
      <p class="page-subtitle">対戦相手を待っています...</p>
    </div>

    <!-- ルームID表示 -->
    <div class="card room-id-card">
      <p class="room-label">ルームID</p>
      <p id="roomIdDisplay" class="room-id">------</p>
      <button id="copyBtn" class="btn-copy">IDをコピー</button>
      <p class="room-hint">このIDを友達に教えてください</p>
    </div>

    <!-- プレイヤー一覧 -->
    <div class="card">
      <h2>プレイヤー</h2>
      <div class="players-list">

        <!-- プレイヤー1（自分） -->
        <div class="player-row">
          <div class="player-info">
            <span class="player-icon">👤</span>
            <span id="player1Name" class="player-row-name">---</span>
            <span class="host-badge hidden" id="hostBadge1">ホスト</span>
          </div>
          <span id="player1Ready" class="status-badge waiting">待機中</span>
        </div>

        <!-- プレイヤー2（相手） -->
        <div class="player-row">
          <div class="player-info">
            <span class="player-icon">👤</span>
            <span id="player2Name" class="player-row-name">参加待ち...</span>
            <span class="host-badge hidden" id="hostBadge2">ホスト</span>
          </div>
          <span id="player2Ready" class="status-badge waiting">待機中</span>
        </div>

      </div>
    </div>

    <!-- アクションボタン -->
    <div class="action-area">
      <!-- 準備完了ボタン -->
      <button id="readyBtn" class="btn-primary" disabled>
        相手の参加を待っています
      </button>

      <!-- ゲーム開始ボタン（ホストのみ・両者準備完了後に表示） -->
      <button id="startGameBtn" class="btn-start hidden">
        🎮 ゲームを開始する
      </button>
    </div>

    <!-- 戻るボタン -->
    <button id="leaveBtn" class="btn-logout">← ロビーに戻る</button>

  </div>

  <script type="module" src="js/waiting.js"></script>

</body>
</html>
